    get:
      consumes:
      - application/json
      description: Get achievements for a player with unlock status
      parameters:
      - description: Player ID
        in: path
        name: player_id
        required: true
        type: integer
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get player achievements
      tags:
      - achievements
  /achievements/check:
    post:
      consumes:
