server:
  port: 8080
  mode: debug

database:
  # 使用SQLite（默认）
  driver: sqlite
  dsn: game.db
  
  # 使用MySQL（取消注释以下配置）
  # driver: mysql
  # host: localhost
  # port: 3306
  # user: root
  # password: your_password
  # dbname: agentgame

# 游戏内NPC使用的AI配置
ai:
  provider: openai
  base_url: https://api.openai.com/v1
  api_key: your-api-key-here
  model: gpt-4

# 生成智能体配置（用于生成游戏配置，独立大模型地址）
generator:
  enabled: true
  provider: openai
  base_url: https://api.openai.com/v1  # 可以配置不同的大模型地址
  api_key: your-generator-api-key-here
  model: gpt-4-turbo
  temperature: 0.7
  max_tokens: 4000
  timeout: 60

game:
  max_players: 100
  tick_rate: 20
